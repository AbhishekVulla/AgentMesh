<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Neutral scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--am-bg); }
  .card { padding: 24px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .sw { border-radius: 10px; padding: 10px; height: 92px; border: 1px solid var(--am-border); display: flex; flex-direction: column; justify-content: space-between; }
  .lbl { font-family: var(--am-font-mono); font-size: 10px; letter-spacing:.08em; text-transform:uppercase; }
  .hex { font-family: var(--am-font-mono); font-size: 11px; }
</style></head>
<body><div class="card">
  <div class="sw" style="background:#05070b"><span class="lbl" style="color:#868ca0">ink 0</span><span class="hex" style="color:#e4e7ef">#05070b</span></div>
  <div class="sw" style="background:#0a0d14"><span class="lbl" style="color:#868ca0">ink 50</span><span class="hex" style="color:#e4e7ef">#0a0d14</span></div>
  <div class="sw" style="background:#0f131c"><span class="lbl" style="color:#868ca0">ink 100</span><span class="hex" style="color:#e4e7ef">#0f131c</span></div>
  <div class="sw" style="background:#141823"><span class="lbl" style="color:#868ca0">ink 150</span><span class="hex" style="color:#e4e7ef">#141823</span></div>
  <div class="sw" style="background:#1a1f2c"><span class="lbl" style="color:#868ca0">ink 200</span><span class="hex" style="color:#e4e7ef">#1a1f2c</span></div>
  <div class="sw" style="background:#232836"><span class="lbl" style="color:#868ca0">ink 300</span><span class="hex" style="color:#e4e7ef">#232836</span></div>
  <div class="sw" style="background:#2d3240"><span class="lbl" style="color:#b8becc">ink 400</span><span class="hex" style="color:#e4e7ef">#2d3240</span></div>
  <div class="sw" style="background:#3a3f4e"><span class="lbl" style="color:#b8becc">ink 500</span><span class="hex" style="color:#e4e7ef">#3a3f4e</span></div>
  <div class="sw" style="background:#5a6072"><span class="lbl" style="color:#0a0d14">ink 600</span><span class="hex" style="color:#fff">#5a6072</span></div>
  <div class="sw" style="background:#868ca0"><span class="lbl" style="color:#0a0d14">ink 700</span><span class="hex" style="color:#0a0d14">#868ca0</span></div>
  <div class="sw" style="background:#b8becc"><span class="lbl" style="color:#0a0d14">ink 800</span><span class="hex" style="color:#0a0d14">#b8becc</span></div>
  <div class="sw" style="background:#e4e7ef"><span class="lbl" style="color:#0a0d14">ink 900</span><span class="hex" style="color:#0a0d14">#e4e7ef</span></div>
</div></body></html>
