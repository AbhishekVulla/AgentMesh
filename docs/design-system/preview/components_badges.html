<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Badges & tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--am-bg); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .meta { font-family: var(--am-font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--am-fg-subtle); width: 80px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--am-border-strong); background: var(--am-bg-card); color: var(--am-fg-muted); }
  .dot { width: 6px; height: 6px; border-radius: 999px; }
  .mint { background: rgba(31,208,138,.12); color: var(--am-mint-300); border-color: rgba(31,208,138,.25); }
  .iris { background: rgba(122,140,255,.12); color: var(--am-iris-300); border-color: rgba(122,140,255,.25); }
  .amber { background: rgba(245,184,76,.1); color: #ffca6b; border-color: rgba(245,184,76,.25); }
  .red { background: rgba(255,93,107,.1); color: #ff8c96; border-color: rgba(255,93,107,.25); }
  .tag { padding: 2px 8px; border-radius: 3px; font-family: var(--am-font-mono); font-size: 10px; letter-spacing: .04em; background: var(--am-ink-200); color: var(--am-fg-muted); border: 1px solid var(--am-border); }
</style></head>
<body><div class="wrap">
  <div class="row"><span class="meta">Status</span>
    <span class="badge mint"><span class="dot" style="background:#1fd08a"></span>Working</span>
    <span class="badge iris"><span class="dot" style="background:#7a8cff"></span>Thinking</span>
    <span class="badge amber"><span class="dot" style="background:#f5b84c"></span>Waiting</span>
    <span class="badge"><span class="dot" style="background:#5a6072"></span>Idle</span>
    <span class="badge red"><span class="dot" style="background:#ff5d6b"></span>Error</span>
  </div>
  <div class="row"><span class="meta">Count</span>
    <span class="badge">12 files</span>
    <span class="badge mint">+3 new</span>
    <span class="badge">142K / 200K</span>
  </div>
  <div class="row"><span class="meta">Tag</span>
    <span class="tag">sonnet-4-5</span>
    <span class="tag">haiku-4-5</span>
    <span class="tag">v2.4.0</span>
    <span class="tag">beta</span>
  </div>
</div></body></html>
