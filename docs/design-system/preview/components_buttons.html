<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--am-bg); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .meta { font-family: var(--am-font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--am-fg-subtle); width: 80px; }
  button { font-family: var(--am-font-sans); font-size: 13px; font-weight: 500; border-radius: 6px; border: 1px solid transparent; padding: 7px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 120ms var(--am-ease-out); }
  .btn-primary { background: var(--am-mint-400); color: #05070b; }
  .btn-primary:hover { background: var(--am-mint-300); }
  .btn-secondary { background: var(--am-ink-200); color: var(--am-fg); border-color: var(--am-border-strong); }
  .btn-secondary:hover { background: var(--am-ink-300); }
  .btn-ghost { background: transparent; color: var(--am-fg-muted); }
  .btn-ghost:hover { background: var(--am-ink-200); color: var(--am-fg); }
  .btn-danger { background: #2a1418; color: #ff5d6b; border-color: rgba(255,93,107,.3); }
  .btn-danger:hover { background: #361b1f; }
  .btn-sm { font-size: 12px; padding: 4px 10px; }
  .btn-lg { font-size: 14px; padding: 10px 20px; }
  .btn-ico { padding: 6px; }
</style></head>
<body><div class="wrap">
  <div class="row"><span class="meta">Primary</span>
    <button class="btn-primary">+ Spawn agent</button>
    <button class="btn-primary btn-sm">Allow</button>
    <button class="btn-primary btn-lg">Run all</button>
  </div>
  <div class="row"><span class="meta">Secondary</span>
    <button class="btn-secondary">Layout</button>
    <button class="btn-secondary">Settings</button>
    <button class="btn-secondary btn-sm">Cancel</button>
  </div>
  <div class="row"><span class="meta">Ghost</span>
    <button class="btn-ghost">Dismiss</button>
    <button class="btn-ghost btn-sm">View logs</button>
    <button class="btn-ghost btn-ico" title="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="row"><span class="meta">Danger</span>
    <button class="btn-danger">Kill agent</button>
    <button class="btn-danger btn-sm">Deny</button>
  </div>
</div></body></html>
