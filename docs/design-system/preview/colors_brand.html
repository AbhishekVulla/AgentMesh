<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Brand & accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--am-bg); }
  .card { padding: 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { border-radius: 10px; padding: 10px; height: 92px; border: 1px solid var(--am-border); display: flex; flex-direction: column; justify-content: space-between; }
  .lbl { font-family: var(--am-font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .hex { font-family: var(--am-font-mono); font-size: 11px; }
</style>
</head>
<body>
<div class="card">
  <!-- Sage mint — muted, editorial -->
  <div class="sw" style="background:#eef5f1"><span class="lbl" style="color:#4a6b5a">sage 50</span><span class="hex" style="color:#4a6b5a">#eef5f1</span></div>
  <div class="sw" style="background:#d4e4da"><span class="lbl" style="color:#4a6b5a">sage 100</span><span class="hex" style="color:#4a6b5a">#d4e4da</span></div>
  <div class="sw" style="background:#a8c6b4"><span class="lbl" style="color:#2e4a3b">sage 200</span><span class="hex" style="color:#2e4a3b">#a8c6b4</span></div>
  <div class="sw" style="background:#7aa68d"><span class="lbl" style="color:#1e2d24">sage 300</span><span class="hex" style="color:#1e2d24">#7aa68d</span></div>
  <div class="sw" style="background:#5a8a73; box-shadow:0 0 0 1px rgba(90,138,115,.25)"><span class="lbl" style="color:#05070b">sage 400 ◆</span><span class="hex" style="color:#05070b">#5a8a73</span></div>
  <div class="sw" style="background:#456e5b"><span class="lbl" style="color:#e4e7ef">sage 500</span><span class="hex" style="color:#e4e7ef">#456e5b</span></div>
  <div class="sw" style="background:#355548"><span class="lbl" style="color:#e4e7ef">sage 600</span><span class="hex" style="color:#e4e7ef">#355548</span></div>
  <div class="sw" style="background:#253c34"><span class="lbl" style="color:#e4e7ef">sage 700</span><span class="hex" style="color:#e4e7ef">#253c34</span></div>
  <div class="sw" style="background:#8a93b8"><span class="lbl" style="color:#1a1f2c">slate blue 400</span><span class="hex" style="color:#1a1f2c">#8a93b8</span></div>
  <div class="sw" style="background:#5e6a95"><span class="lbl" style="color:#e4e7ef">slate blue 500</span><span class="hex" style="color:#e4e7ef">#5e6a95</span></div>
</div>
</body>
</html>
