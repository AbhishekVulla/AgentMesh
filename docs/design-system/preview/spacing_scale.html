<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--am-bg); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 90px 80px 1fr; align-items: center; gap: 16px; }
  .name { font-family: var(--am-font-mono); font-size: 11px; color: var(--am-fg-muted); }
  .px { font-family: var(--am-font-mono); font-size: 11px; color: var(--am-fg-subtle); }
  .bar { height: 14px; background: var(--am-mint-400); border-radius: 3px; }
</style></head>
<body><div class="wrap">
  <div class="row"><span class="name">space-1</span><span class="px">4 px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="name">space-2</span><span class="px">8 px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="name">space-3</span><span class="px">12 px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="name">space-4</span><span class="px">16 px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="name">space-6</span><span class="px">24 px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="name">space-8</span><span class="px">32 px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="name">space-12</span><span class="px">48 px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="name">space-16</span><span class="px">64 px</span><div class="bar" style="width:64px"></div></div>
</div></body></html>
