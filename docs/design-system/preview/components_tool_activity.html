<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Tool activity line</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--am-bg); }
  .wrap { padding: 20px; display: flex; flex-direction: column; gap: 6px; }
  .t { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 6px; font-size: 12px; color: var(--am-fg-muted); }
  .t:hover { background: var(--am-ink-200); }
  .dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
  .pulse { animation: p 1.5s ease-in-out infinite; }
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:.4} }
  code { font-family: var(--am-font-mono); font-size: 12px; color: var(--am-mint-200); background: var(--am-ink-200); padding: 1px 5px; border-radius: 3px; }
  .tm { margin-left: auto; font-family: var(--am-font-mono); font-size: 10px; color: var(--am-fg-subtle); font-variant-numeric: tabular-nums; }
  .desc { color: var(--am-fg); }
  .done { opacity: .55; }
</style></head>
<body><div class="wrap">
  <div class="t done"><span class="dot" style="background:#1fd08a"></span><span class="desc">Read</span> <code>src/App.tsx</code><span class="tm">1.2s</span></div>
  <div class="t done"><span class="dot" style="background:#1fd08a"></span><span class="desc">Read</span> <code>package.json</code><span class="tm">0.4s</span></div>
  <div class="t done"><span class="dot" style="background:#1fd08a"></span><span class="desc">Grep</span> <code>useEffect</code><span class="tm">0.9s</span></div>
  <div class="t"><span class="dot pulse" style="background:#1fd08a"></span><span class="desc">Edit</span> <code>src/App.tsx</code> <span style="color:var(--am-fg-subtle)">· line 42</span><span class="tm">3.8s</span></div>
  <div class="t"><span class="dot pulse" style="background:#f5b84c"></span><span class="desc" style="color:#f5b84c">Bash</span> <code>npm test -- --watch</code> <span style="color:#f5b84c">· Needs approval</span><span class="tm">waiting</span></div>
</div></body></html>
