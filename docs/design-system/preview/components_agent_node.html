<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Agent node</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: radial-gradient(circle at 50% 40%, #0f1a16 0%, #0a0d14 70%); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; place-items: center; min-height: 240px; position: relative; }
  .node { width: 76px; height: 76px; border-radius: 18px; background: conic-gradient(from 210deg, #1fd08a, #7a8cff, #1fd08a); padding: 2px; position: relative; display: flex; align-items: center; justify-content: center; }
  .node-inner { width: 100%; height: 100%; border-radius: 16px; background: var(--am-ink-150); display: flex; align-items: center; justify-content: center; font-family: var(--am-font-mono); font-size: 18px; color: var(--am-fg); font-weight: 600; }
  .label { margin-top: 8px; font-family: var(--am-font-mono); font-size: 11px; color: var(--am-fg-muted); text-align: center; }
  .status { margin-top: 3px; font-size: 10px; text-align: center; color: var(--am-fg-subtle); }
  .col { display: flex; flex-direction: column; align-items: center; }
  /* variants */
  .idle { background: var(--am-ink-400); }
  .idle .node-inner { background: var(--am-ink-150); color: var(--am-fg-subtle); }
  .thinking { background: conic-gradient(from 0deg, #7a8cff, #4454d4, #7a8cff); animation: spin 3s linear infinite; }
  .working { background: conic-gradient(from 0deg, #1fd08a, #0c8f5e, #1fd08a); animation: spin 2.2s linear infinite; box-shadow: 0 0 0 2px rgba(31,208,138,.18), 0 0 24px rgba(31,208,138,.22); }
  .waiting { background: #f5b84c; }
  .waiting .node-inner::after { content:'!'; position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; background: #f5b84c; color:#05070b; border-radius: 999px; font-size: 12px; display:flex; align-items:center; justify-content:center; border: 2px solid var(--am-bg); }
  .error { background: #ff5d6b; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style></head>
<body><div class="wrap">
  <div class="col"><div class="node idle"><div class="node-inner">A1</div></div><div class="label">agent-1</div><div class="status">Idle</div></div>
  <div class="col"><div class="node thinking"><div class="node-inner">A2</div></div><div class="label">agent-2</div><div class="status">Thinking</div></div>
  <div class="col"><div class="node working"><div class="node-inner">A3</div></div><div class="label">agent-3</div><div class="status">Writing App.tsx</div></div>
  <div class="col"><div class="node waiting"><div class="node-inner" style="position:relative">A4</div></div><div class="label">agent-4</div><div class="status">Needs approval</div></div>
  <div class="col"><div class="node error"><div class="node-inner">A5</div></div><div class="label">agent-5</div><div class="status">Failed</div></div>
</div></body></html>
