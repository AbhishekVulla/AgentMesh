<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Semantic surface tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--am-bg); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .t { border: 1px solid var(--am-border); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 6px; min-height: 92px; justify-content: space-between; }
  .k { font-family: var(--am-font-mono); font-size: 11px; color: var(--am-fg-muted); letter-spacing: .03em; }
  .v { font-family: var(--am-font-mono); font-size: 10px; color: var(--am-fg-subtle); }
  .name { font-size: 12px; color: var(--am-fg); font-weight: 600; }
</style></head>
<body><div class="wrap">
  <div class="t" style="background:#0a0d14"><span class="name">bg</span><span class="k">--am-bg</span><span class="v">#0a0d14</span></div>
  <div class="t" style="background:#0f131c"><span class="name">bg-raised</span><span class="k">--am-bg-raised</span><span class="v">#0f131c</span></div>
  <div class="t" style="background:#141823"><span class="name">bg-panel</span><span class="k">--am-bg-panel</span><span class="v">#141823</span></div>
  <div class="t" style="background:#1a1f2c"><span class="name">bg-card</span><span class="k">--am-bg-card</span><span class="v">#1a1f2c</span></div>
  <div class="t" style="background:#232836"><span class="name">bg-hover</span><span class="k">--am-bg-hover</span><span class="v">#232836</span></div>
  <div class="t" style="background:#1b2a24"><span class="name">bg-active</span><span class="k">--am-bg-active</span><span class="v">#1b2a24</span></div>
  <div class="t" style="background:#1a1f2c;border-color:rgba(255,255,255,.06)"><span class="name">border</span><span class="k">rgba(255,255,255,.06)</span><span class="v">default 1px</span></div>
  <div class="t" style="background:#1a1f2c;border-color:#1fd08a"><span class="name">border-accent</span><span class="k">--am-mint-400</span><span class="v">#1fd08a</span></div>
</div></body></html>
