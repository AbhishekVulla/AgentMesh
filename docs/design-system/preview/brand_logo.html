<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--am-bg); }
  .wrap { padding: 24px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
  .card { background: var(--am-bg-card); border: 1px solid var(--am-border); border-radius: 10px; padding: 22px; display: flex; align-items: center; justify-content: center; min-height: 120px; }
  .small { display: flex; gap: 22px; align-items: center; }
  .note { font-family: var(--am-font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--am-fg-subtle); position: absolute; }
  .card { position: relative; }
  .card .note { top: 10px; left: 12px; }
</style></head>
<body><div class="wrap">
  <div class="card"><span class="note">Wordmark</span><img src="../assets/logo_wordmark.svg" width="240" alt="AgentMesh"/></div>
  <div class="card"><span class="note">Glyph · 16 · 24 · 40</span><div class="small"><img src="../assets/logo_glyph.svg" width="16"/><img src="../assets/logo_glyph.svg" width="24"/><img src="../assets/logo_glyph.svg" width="40"/></div></div>
</div></body></html>
