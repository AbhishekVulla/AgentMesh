<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: var(--am-bg); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .t { background: var(--am-bg-card); border: 1px solid var(--am-border-strong); height: 92px; display: flex; align-items: flex-end; justify-content: space-between; padding: 10px; }
  .name { font-family: var(--am-font-mono); font-size: 10px; color: var(--am-fg-muted); letter-spacing: .06em; text-transform: uppercase; }
  .px { font-family: var(--am-font-mono); font-size: 10px; color: var(--am-fg-subtle); }
</style></head>
<body><div class="wrap">
  <div class="t" style="border-radius:3px"><span class="name">xs</span><span class="px">3</span></div>
  <div class="t" style="border-radius:6px"><span class="name">sm</span><span class="px">6</span></div>
  <div class="t" style="border-radius:10px"><span class="name">md</span><span class="px">10</span></div>
  <div class="t" style="border-radius:14px"><span class="name">lg</span><span class="px">14</span></div>
  <div class="t" style="border-radius:20px"><span class="name">xl</span><span class="px">20</span></div>
  <div class="t" style="border-radius:999px"><span class="name">pill</span><span class="px">∞</span></div>
</div></body></html>
