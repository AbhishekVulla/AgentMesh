# Publish/subscribe declarations for the 6-agent showcase roster.
#
# Shape and rules from docs/ARCHITECTURE.md §6. Loaded by mesh/router.py.
# Glob-style path patterns — `*` matches one segment, `**` matches many.
# Route path slashes ("/api/users") are part of a segment.
#
# Each publishes entry describes ONE outbound rule:
#   <pattern>: { notify: [<target_agent_ids>], tier: <L1|L2|L3>, priority: <low|normal|high> }
#
# MVP only honors tier: L2 (structured summary). Priority defaults to "normal".

orchestrator:
  publishes:
    plan.*:
      notify: [researcher, agent-6]
      tier: L2
      priority: high
  subscribes:
    reviewer.approvals.*: L2
    agent-6.dependencies.*: L2

researcher:
  publishes:
    contracts.*:
      notify: [tests, formatter]
      tier: L2
      priority: high
    spec.*:
      notify: [reviewer]
      tier: L2
  subscribes:
    orchestrator.plan.*: L2

tests:
  publishes:
    cases.*:
      notify: [reviewer]
      tier: L2
  subscribes:
    researcher.contracts.*: L2

formatter:
  publishes:
    lint_rules.*:
      notify: [reviewer]
      tier: L2
    style.*:
      notify: [reviewer]
      tier: L2
  subscribes:
    researcher.contracts.*: L2
    reviewer.approvals.*: L2

reviewer:
  publishes:
    approvals.*:
      notify: [orchestrator, formatter]
      tier: L2
      priority: high
  subscribes:
    tests.cases.*: L2
    formatter.lint_rules.*: L2
    agent-6.dependencies.*: L2

agent-6:
  publishes:
    dependencies.*:
      notify: [reviewer, orchestrator]
      tier: L2
  subscribes:
    orchestrator.plan.*: L2
