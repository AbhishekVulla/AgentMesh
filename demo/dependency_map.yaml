# Publish/subscribe declarations.
#
# Shape and rules from docs/ARCHITECTURE.md §6. Loaded by mesh/router.py.
# Glob-style path patterns — `*` matches one segment, `**` matches many.
# Route path slashes ("/api/users") are part of a segment.
#
# Each publishes entry describes ONE outbound rule:
#   <pattern>: { notify: [<target_agent_ids>], tier: <L1|L2|L3>, priority: <low|normal|high> }
#
# MVP only honors tier: L2 (structured summary). Priority defaults to "normal".

backend:
  publishes:
    routes.*:
      notify: [frontend]
      tier: L2
    models.*:
      notify: [database]
      tier: L2
    auth.*:
      notify: [frontend]
      tier: L2
      priority: high
  subscribes:
    database.schema.*: L2

frontend:
  publishes:
    api_calls.*:
      notify: [backend]
      tier: L2
  subscribes:
    backend.routes.*: L2
    backend.auth.*: L2

database:
  publishes:
    schema.*:
      notify: [backend]
      tier: L2
  subscribes:
    backend.models.*: L2
