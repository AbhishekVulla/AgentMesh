# Deterministic conflict-resolution priority table.
# docs/ARCHITECTURE.md §7. Each category lists the ordered winners —
# earlier in the list wins against later.

route_auth_changes:
  winners: [backend, reviewer, frontend, formatter, database]
  # Example match: backend.routes./api/users.auth_required

schema_changes:
  winners: [database, researcher, backend, reviewer, frontend, formatter]
  # Example match: database.schema.<table>.*

component_changes:
  winners: [frontend, formatter, backend, reviewer, database]
  # Example match: frontend.components.*

contract_breaking_changes:
  winners: [researcher, tests, formatter, reviewer, orchestrator, agent-6]
  # Example match: researcher.contracts.<route>.breaking_change

approval_security_reviews:
  winners: [reviewer, formatter, tests, orchestrator, researcher, agent-6]
  # Example match: reviewer.approvals.<route>.security_required

dependency_changes:
  winners: [agent-6, reviewer, orchestrator, researcher, tests, formatter]
  # Example match: agent-6.dependencies.<package>.*
